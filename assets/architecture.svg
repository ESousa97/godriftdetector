<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .header { fill: #2c3e50; color: white; font-weight: bold; font-size: 14px; }
      .text { fill: #333; font-size: 12px; font-family: Arial; }
      .arrow { stroke: #27ae60; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>
  <text x="600" y="30" text-anchor="middle" font-size="24" font-weight="bold">GoDriftDetector Architecture - All 8 Phases</text>
  
  <rect x="50" y="80" width="150" height="80" class="box" rx="5"/>
  <text x="125" y="105" class="header" text-anchor="middle">Phase 1</text>
  <text x="125" y="130" class="text" text-anchor="middle" font-weight="bold">Docker Runtime</text>
  
  <rect x="250" y="80" width="150" height="80" class="box" rx="5"/>
  <text x="325" y="105" class="header" text-anchor="middle">Phase 2</text>
  <text x="325" y="130" class="text" text-anchor="middle" font-weight="bold">Config Files</text>
  
  <rect x="450" y="80" width="150" height="80" class="box" rx="5"/>
  <text x="525" y="105" class="header" text-anchor="middle">Phase 4</text>
  <text x="525" y="130" class="text" text-anchor="middle" font-weight="bold">Git Repo</text>
  
  <rect x="650" y="80" width="150" height="80" class="box" rx="5"/>
  <text x="725" y="105" class="header" text-anchor="middle">Phase 7</text>
  <text x="725" y="130" class="text" text-anchor="middle" font-weight="bold">Kubernetes</text>
  
  <rect x="200" y="240" width="700" height="80" class="box" rx="5" fill="#ffe0b2"/>
  <text x="550" y="265" class="header" text-anchor="middle" fill="#e65100">Phase 3 + 6: Comparator</text>
  <text x="550" y="290" class="text" text-anchor="middle">6 Drift Types: MISSING | SHADOW_IT | PORT_MISMATCH | IMAGE_MISMATCH | ENV_MISMATCH | ENV_INJECTED</text>
  <text x="550" y="310" class="text" text-anchor="middle">Phase 6: Environment Variable Inspection with Sensitive Masking</text>
  
  <rect x="50" y="380" width="150" height="80" class="box" rx="5" fill="#c8e6c9"/>
  <text x="125" y="405" class="header" text-anchor="middle" fill="#1b5e20">Terminal</text>
  <text x="125" y="430" class="text" text-anchor="middle">Phase 3: Colored</text>
  <text x="125" y="450" class="text" text-anchor="middle">Logs</text>
  
  <rect x="250" y="380" width="150" height="80" class="box" rx="5" fill="#bbdefb"/>
  <text x="325" y="405" class="header" text-anchor="middle" fill="#01579b">JSON</text>
  <text x="325" y="430" class="text" text-anchor="middle">Phase 5: Audit</text>
  <text x="325" y="450" class="text" text-anchor="middle">Export</text>
  
  <rect x="450" y="380" width="150" height="80" class="box" rx="5" fill="#f8bbd0"/>
  <text x="525" y="405" class="header" text-anchor="middle" fill="#880e4f">Webhooks</text>
  <text x="525" y="430" class="text" text-anchor="middle">Phase 5: Slack</text>
  <text x="525" y="450" class="text" text-anchor="middle">Discord</text>
  
  <rect x="650" y="380" width="150" height="80" class="box" rx="5" fill="#e1bee7"/>
  <text x="725" y="405" class="header" text-anchor="middle" fill="#4a148c">Prometheus</text>
  <text x="725" y="430" class="text" text-anchor="middle">Phase 8: Metrics</text>
  <text x="725" y="450" class="text" text-anchor="middle">Port 9090</text>
  
  <rect x="50" y="540" width="900" height="100" class="box" rx="5" fill="#eceff1"/>
  <text x="500" y="565" class="header" text-anchor="middle" fill="#263238">Phase 4: Daemon Loop (SYNC_INTERVAL)</text>
  <text x="500" y="590" class="text" text-anchor="middle">GitSync → Parse → GetState → Compare → UpdateMetrics → SendAlerts → Log → Wait → Repeat</text>
  <text x="500" y="615" class="text" text-anchor="middle">Graceful shutdown | --provider docker|k8s | --json one-shot | Env vars: GIT_REPO_URL, LOCAL_CONFIG_DIR, SYNC_INTERVAL, WEBHOOK_URL</text>
  
  <rect x="50" y="700" width="900" height="140" class="box" rx="5" fill="#fce4ec"/>
  <text x="500" y="725" class="header" text-anchor="middle" fill="#880e4f">All 8 Phases Implemented</text>
  <text x="500" y="750" class="text" text-anchor="middle">Phase 1: Docker SDK runtime state extraction | Phase 2: YAML/K8s manifest parsing</text>
  <text x="500" y="770" class="text" text-anchor="middle">Phase 3: Diff engine with color-coded output | Phase 4: GitOps daemon with polling</text>
  <text x="500" y="790" class="text" text-anchor="middle">Phase 5: Webhooks &amp; JSON reports | Phase 6: Environment variable deep inspection with masking</text>
  <text x="500" y="810" class="text" text-anchor="middle">Phase 7: Multi-provider (Docker + Kubernetes) with InfrastructureProvider interface</text>
  <text x="500" y="830" class="text" text-anchor="middle">Phase 8: Prometheus metrics (drift_detected_total, drift_by_service, last_scan_timestamp)</text>
</svg>
