<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles & Definitions -->
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .bg { fill: #0f172a; }
      .card { fill: #1e293b; stroke: #334155; stroke-width: 1.5; rx: 12; }
      .card-highlight { stroke: #38bdf8; stroke-width: 2; }
      .title { fill: #f8fafc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.025em; }
      .label { fill: #f8fafc; font-family: 'Segoe UI', Arial; font-size: 16px; font-weight: 600; }
      .sublabel { fill: #94a3b8; font-family: 'Segoe UI', Arial; font-size: 13px; }
      .phase-tag { fill: #38bdf8; font-family: 'Segoe UI', Arial; font-size: 11px; font-weight: bold; }
      .arrow-line { stroke: #475569; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
      .arrow-head { fill: #475569; }
      .drift-line { stroke: #f59e0b; stroke-width: 2; fill: none; marker-end: url(#arrow-drift); }
      .core-engine { fill: #0ea5e9; stroke: #38bdf8; stroke-width: 3; filter: url(#glow); }
    </style>

    <marker id="arrow-drift" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-default" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <text x="600" y="60" text-anchor="middle" class="title">GoDriftDetector Architecture</text>
  <text x="600" y="90" text-anchor="middle" class="sublabel">Real-time Infrastructure Drift Detection &amp; Observability</text>

  <!-- DESIRED STATE (The Specs) -->
  <g transform="translate(50, 150)">
    <rect width="250" height="480" class="card" />
    <text x="125" y="35" text-anchor="middle" class="label" fill="#38bdf8">DESIRED STATE</text>
    <text x="125" y="55" text-anchor="middle" class="sublabel">The Infrastructure Code</text>
    
    <!-- Git Repo -->
    <g transform="translate(25, 80)">
      <rect width="200" height="100" class="card" stroke="#38bdf8" stroke-dasharray="2 2" />
      <text x="100" y="30" text-anchor="middle" class="label">Git Repository</text>
      <text x="100" y="55" text-anchor="middle" class="sublabel">docker-compose.yaml</text>
      <text x="100" y="75" text-anchor="middle" class="sublabel">k8s-manifests.yaml</text>
      <text x="10" y="-10" class="phase-tag">PHASE 4 &amp; 7</text>
    </g>

    <!-- Local Files -->
    <g transform="translate(25, 200)">
      <rect width="200" height="80" class="card" />
      <text x="100" y="30" text-anchor="middle" class="label">Local Filesystem</text>
      <text x="100" y="55" text-anchor="middle" class="sublabel">Static Config Files</text>
      <text x="10" y="-10" class="phase-tag">PHASE 2</text>
    </g>
    
    <!-- Environment Config -->
    <g transform="translate(25, 300)">
      <rect width="200" height="80" class="card" />
      <text x="100" y="30" text-anchor="middle" class="label">Env Variables</text>
      <text x="100" y="55" text-anchor="middle" class="sublabel">Secrets &amp; Global Vars</text>
      <text x="10" y="-10" class="phase-tag">PHASE 6</text>
    </g>
  </g>

  <!-- ACTUAL STATE (The Runtime) -->
  <g transform="translate(900, 150)">
    <rect width="250" height="480" class="card" />
    <text x="125" y="35" text-anchor="middle" class="label" fill="#4ade80">ACTUAL STATE</text>
    <text x="125" y="55" text-anchor="middle" class="sublabel">Running Infrastructure</text>

    <!-- Docker -->
    <g transform="translate(25, 80)">
      <rect width="200" height="100" class="card" stroke="#4ade80" />
      <text x="100" y="30" text-anchor="middle" class="label">Docker Engine</text>
      <text x="100" y="55" text-anchor="middle" class="sublabel">Running Containers</text>
      <text x="100" y="75" text-anchor="middle" class="sublabel">Docker SDK</text>
      <text x="10" y="-10" class="phase-tag" fill="#4ade80">PHASE 1</text>
    </g>

    <!-- Kubernetes -->
    <g transform="translate(25, 200)">
      <rect width="200" height="100" class="card" stroke="#4ade80" />
      <text x="100" y="30" text-anchor="middle" class="label">Kubernetes</text>
      <text x="100" y="55" text-anchor="middle" class="sublabel">Pods &amp; Services</text>
      <text x="100" y="75" text-anchor="middle" class="sublabel">K8s API Clients</text>
      <text x="10" y="-10" class="phase-tag" fill="#4ade80">PHASE 7</text>
    </g>
  </g>

  <!-- THE ENGINE (Center) -->
  <g transform="translate(350, 200)">
    <rect width="500" height="380" class="card" stroke="#38bdf8" stroke-width="2" />
    <text x="250" y="35" text-anchor="middle" class="label" font-size="20">GoDriftDetector Daemon</text>
    
    <!-- Components -->
    <g transform="translate(50, 70)">
       <!-- Git Poller -->
       <rect x="0" y="0" width="180" height="60" rx="8" class="card" />
       <text x="90" y="25" text-anchor="middle" class="label" font-size="14">GitSync / Poller</text>
       <text x="90" y="45" text-anchor="middle" class="sublabel">Interval: SYNC_INTERVAL</text>
       
       <!-- Parser -->
       <rect x="220" y="0" width="180" height="60" rx="8" class="card" />
       <text x="310" y="25" text-anchor="middle" class="label" font-size="14">YAML/Manifest Parser</text>
       <text x="310" y="45" text-anchor="middle" class="sublabel">Desired State Mapping</text>
    </g>

    <!-- COMPARATOR (The Core) -->
    <g transform="translate(100, 160)">
      <rect width="300" height="140" rx="15" class="core-engine" />
      <text x="150" y="40" text-anchor="middle" class="label" font-size="18" fill="#ffffff">COMPARATOR ENGINE</text>
      <text x="150" y="65" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="14" fill="#ffffff" font-weight="500">Deep Diff Logic</text>
      
      <!-- Drift Types -->
      <text x="150" y="95" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#ffffff" font-weight="bold">MISSING | SHADOW_IT | PORT</text>
      <text x="150" y="115" text-anchor="middle" font-family="'Segoe UI', Arial" font-size="13" fill="#ffffff" font-weight="bold">IMAGE | ENV VARS (Masked)</text>
      <text x="240" y="-10" class="phase-tag" fill="white">PHASE 3 &amp; 6</text>
    </g>
    
    <!-- State Collector -->
    <g transform="translate(50, 320)">
       <rect x="0" y="0" width="400" height="40" rx="8" class="card" />
       <text x="200" y="25" text-anchor="middle" class="label" font-size="14">Infrastructure Provider Interface</text>
    </g>
  </g>

  <!-- OUTPUTS (Bottom) -->
  <g transform="translate(50, 680)">
    <text x="550" y="-20" text-anchor="middle" class="label" fill="#94a3b8">OBSERVABILITY &amp; ACTIONS</text>
    
    <!-- Terminal -->
    <g transform="translate(0, 0)">
      <rect width="250" height="100" class="card" />
      <text x="125" y="40" text-anchor="middle" class="label">Terminal Logs</text>
      <text x="125" y="65" text-anchor="middle" class="sublabel">Color-coded human output</text>
      <text x="10" y="20" class="phase-tag">PHASE 3</text>
    </g>

    <!-- Webhooks -->
    <g transform="translate(280, 0)">
      <rect width="250" height="100" class="card" />
      <text x="125" y="40" text-anchor="middle" class="label">Webhooks</text>
      <text x="125" y="65" text-anchor="middle" class="sublabel">Slack / Discord Alerts</text>
      <text x="10" y="20" class="phase-tag">PHASE 5</text>
    </g>

    <!-- Metrics -->
    <g transform="translate(560, 0)">
      <rect width="250" height="100" class="card" />
      <text x="125" y="40" text-anchor="middle" class="label">Prometheus</text>
      <text x="125" y="65" text-anchor="middle" class="sublabel">Drift Metrics (/metrics)</text>
      <text x="10" y="20" class="phase-tag">PHASE 8</text>
    </g>

    <!-- Audit -->
    <g transform="translate(840, 0)">
      <rect width="250" height="100" class="card" />
      <text x="125" y="40" text-anchor="middle" class="label">JSON Audit</text>
      <text x="125" y="65" text-anchor="middle" class="sublabel">Machine-readable reports</text>
      <text x="10" y="20" class="phase-tag">PHASE 5</text>
    </g>
  </g>

  <!-- Connectors -->
  <!-- Desired to Engine -->
  <path d="M 300 230 L 350 230" class="arrow-line" marker-end="url(#arrow-default)" />
  <path d="M 300 350 L 350 350" class="arrow-line" marker-end="url(#arrow-default)" />
  <path d="M 300 450 L 350 450" class="arrow-line" marker-end="url(#arrow-default)" />

  <!-- Actual to Engine -->
  <path d="M 900 230 L 850 230" class="arrow-line" marker-end="url(#arrow-default)" />
  <path d="M 900 350 L 850 350" class="arrow-line" marker-end="url(#arrow-default)" />

  <!-- Engine to Outputs -->
  <path d="M 600 580 L 600 640 L 125 640 L 125 680" class="drift-line" />
  <path d="M 600 640 L 405 640 L 405 680" class="drift-line" />
  <path d="M 600 640 L 685 640 L 685 680" class="drift-line" />
  <path d="M 600 640 L 965 640 L 965 680" class="drift-line" />

</svg>
