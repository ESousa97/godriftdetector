<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo e Definições -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2f"/>
      <stop offset="100%" stop-color="#282a36"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="8" ry="8"/>

  <!-- Título -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">GoDriftDetector - Arquitetura</text>

  <!-- Componentes Principais -->
  
  <!-- 1. Git Repository (Desired State) -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="200" height="120" rx="10" fill="#44475a" stroke="#bd93f9" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#bd93f9" text-anchor="middle">Repositório Git</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#f8f8f2" text-anchor="middle">docker-compose.yaml</text>
    <text x="100" y="90" font-family="monospace" font-size="14" fill="#50fa7b" text-anchor="middle">ESTADO DESEJADO</text>
  </g>

  <!-- 2. Docker Host (Actual State) -->
  <g transform="translate(50, 300)" filter="url(#shadow)">
    <rect width="200" height="120" rx="10" fill="#44475a" stroke="#8be9fd" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#8be9fd" text-anchor="middle">Docker Runtime</text>
    <text x="100" y="55" font-family="Arial" font-size="12" fill="#f8f8f2" text-anchor="middle">Containers Rodando</text>
    <text x="100" y="90" font-family="monospace" font-size="14" fill="#50fa7b" text-anchor="middle">ESTADO REAL</text>
  </g>

  <!-- 3. GoDriftDetector Daemon (Motor) -->
  <g transform="translate(350, 200)" filter="url(#shadow)">
    <rect width="220" height="140" rx="10" fill="#282a36" stroke="#ff79c6" stroke-width="3"/>
    <text x="110" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#ff79c6" text-anchor="middle">GoDriftDetector</text>
    <text x="110" y="65" font-family="Arial" font-size="12" fill="#f8f8f2" text-anchor="middle">Motor de Comparação (Daemon)</text>
    <text x="110" y="90" font-family="Arial" font-size="12" fill="#f1fa8c" text-anchor="middle">Sincroniza a cada 5m</text>
    
    <rect x="20" y="110" width="180" height="4" fill="#6272a4"/>
    <rect x="20" y="110" width="120" height="4" fill="#50fa7b"/>
  </g>

  <!-- 4. Notificações / Webhooks -->
  <g transform="translate(650, 200)" filter="url(#shadow)">
    <rect width="120" height="140" rx="10" fill="#44475a" stroke="#ff5555" stroke-width="2"/>
    <text x="60" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#ffb86c" text-anchor="middle">Webhooks</text>
    <text x="60" y="70" font-family="Arial" font-size="12" fill="#f8f8f2" text-anchor="middle">Slack</text>
    <text x="60" y="90" font-family="Arial" font-size="12" fill="#f8f8f2" text-anchor="middle">Discord</text>
    <text x="60" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#ff5555" text-anchor="middle">ALERTAS!</text>
  </g>

  <!-- Linhas e Setas -->
  <!-- Seta 1: Git -> Daemon -->
  <path d="M 250 160 Q 300 160 350 240" fill="none" stroke="#bd93f9" stroke-width="3" stroke-dasharray="5,5"/>
  <polygon points="350,240 340,235 345,230" fill="#bd93f9" transform="rotate(50 350 240)"/>
  
  <!-- Seta 2: Docker -> Daemon -->
  <path d="M 250 360 Q 300 360 350 300" fill="none" stroke="#8be9fd" stroke-width="3" stroke-dasharray="5,5"/>
  <polygon points="350,300 340,310 345,315" fill="#8be9fd" transform="rotate(-50 350 300)"/>

  <!-- Seta 3: Daemon -> Webhook -->
  <line x1="570" y1="270" x2="630" y2="270" stroke="#ff79c6" stroke-width="4"/>
  <polygon points="645,270 630,265 630,275" fill="#ff79c6"/>

  <!-- Destaques Operacionais -->
  <!-- Shadow IT -->
  <g transform="translate(370, 360)">
    <text x="0" y="0" font-family="Arial" font-size="14" fill="#ff5555" font-weight="bold">🚨 Shadow IT</text>
  </g>
  <!-- Downtime -->
  <g transform="translate(480, 360)">
    <text x="0" y="0" font-family="Arial" font-size="14" fill="#ff5555" font-weight="bold">🚨 Downtime</text>
  </g>
</svg>
