version: '3.8'

services:
  app-postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: super_secret_123
      POSTGRES_USER: admin
      POSTGRES_DB: appdb
      LOG_LEVEL: info

  app-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: my_secure_token_xyz
      REDIS_TIMEOUT: 30
